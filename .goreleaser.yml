version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: capytrace
    main: ./cmd/capytrace
    binary: capytrace
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: capytrace
    ids:
      - capytrace
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: andev0x
    name: capytrace.nvim
